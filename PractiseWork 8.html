<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="navihacija">
            <button class="nav-button active" data-zavdannya="1">Завдання 1</button>
            <button class="nav-button" data-zavdannya="2">Завдання 2</button>
            <button class="nav-button" data-zavdannya="3">Завдання 3</button>
            <button class="nav-button" data-zavdannya="4">Завдання 4</button>
            <button class="nav-button" data-zavdannya="5">Завдання 5</button>
        </nav>

        <!-- ЗАВДАННЯ 1: ЛОГІН -->
        <div id="zavdannya-1" class="zavdannya-section active">
            <h2>Завдання 1 - Логін</h2>
            <div class="login-forma">
                <label class="label-login">Your login:</label>
                <input type="text" id="input-login-1" class="input-pole-login">
                
                <label class="label-login">Your password:</label>
                <input type="password" id="input-password-1" class="input-pole-login">
                
                <label class="checkbox-remember">
                    <input type="checkbox" id="checkbox-remember-1">
                    Remember me
                </label>
                
                <button id="button-signin-1" class="button-signin">Sign In</button>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            <div id="rezultat-1" class="rezultat-login"></div>
        </div>

        <!-- ЗАВДАННЯ 2: РЕЄСТРАЦІЯ -->
        <div id="zavdannya-2" class="zavdannya-section">
            <h2>Завдання 2 - Реєстрація</h2>
            <div class="signup-forma">
                <div class="forma-ryadok">
                    <div class="forma-kolonna">
                        <label class="label-signup">Your email:</label>
                        <input type="email" id="input-email-2" class="input-pole-signup">
                    </div>
                    <div class="forma-kolonna">
                        <label class="label-signup">Your login:</label>
                        <input type="text" id="input-login-2" class="input-pole-signup">
                    </div>
                </div>
                <div class="forma-ryadok">
                    <div class="forma-kolonna">
                        <label class="label-signup">Your password:</label>
                        <input type="password" id="input-password-2" class="input-pole-signup">
                    </div>
                    <div class="forma-kolonna">
                        <label class="label-signup">Repeat password:</label>
                        <input type="password" id="input-repeat-password-2" class="input-pole-signup">
                    </div>
                </div>
                <button id="button-signup-2" class="button-signup">Sign Up</button>
            </div>
            <div id="rezultat-2" class="rezultat-signup"></div>
        </div>

        <!-- ЗАВДАННЯ 3: ІНФОРМАЦІЯ ПРО КОРИСТУВАЧА -->
        <div id="zavdannya-3" class="zavdannya-section">
            <h2>Завдання 3 - Інформація про користувача</h2>
            <div class="user-info-forma">
                <div class="forma-ryadok">
                    <div class="forma-kolonna">
                        <label class="label-user">Firstname:</label>
                        <input type="text" id="input-firstname-3" class="input-pole-user">
                    </div>
                    <div class="forma-kolonna">
                        <label class="label-user">Lastname:</label>
                        <input type="text" id="input-lastname-3" class="input-pole-user">
                    </div>
                </div>
                <div class="forma-ryadok">
                    <div class="forma-kolonna">
                        <label class="label-user">Birthday:</label>
                        <input type="date" id="input-birthday-3" class="input-pole-user">
                    </div>
                    <div class="forma-kolonna">
                        <label class="label-user">Gender:</label>
                        <div class="radio-gender-group">
                            <label class="radio-gender"><input type="radio" name="gender-3" value="Male"> Male</label>
                            <label class="radio-gender"><input type="radio" name="gender-3" value="Female"> Female</label>
                        </div>
                    </div>
                </div>
                <div class="forma-ryadok">
                    <div class="forma-kolonna">
                        <label class="label-user">Country:</label>
                        <select id="select-country-3" class="select-pole-user">
                            <option value="">Виберіть країну</option>
                            <option value="Ukraine">Ukraine</option>
                            <option value="Canada">Canada</option>
                            <option value="USA">USA</option>
                        </select>
                    </div>
                    <div class="forma-kolonna">
                        <label class="label-user">City:</label>
                        <select id="select-city-3" class="select-pole-user">
                            <option value="">Виберіть місто</option>
                        </select>
                    </div>
                </div>
                <div class="skills-group">
                    <label class="label-user">Skills:</label>
                    <div class="skills-checkboxes">
                        <label class="skill-checkbox"><input type="checkbox" value="HTML"> HTML</label>
                        <label class="skill-checkbox"><input type="checkbox" value="CSS"> CSS</label>
                        <label class="skill-checkbox"><input type="checkbox" value="JS"> JS</label>
                        <label class="skill-checkbox"><input type="checkbox" value="PHP"> PHP</label>
                        <label class="skill-checkbox"><input type="checkbox" value="C++"> C++</label>
                        <label class="skill-checkbox"><input type="checkbox" value="JAVA"> JAVA</label>
                        <label class="skill-checkbox"><input type="checkbox" value="C#"> C#</label>
                    </div>
                </div>
                <button id="button-save-3" class="button-save">Save</button>
            </div>
            <div id="rezultat-3" class="rezultat-user-info"></div>
        </div>

        <!-- ЗАВДАННЯ 4: ПАЛІТРА КОЛЬОРІВ -->
        <div id="zavdannya-4" class="zavdannya-section">
            <h2>Завдання 4 - Палітра кольорів</h2>
            <div class="paletka-container">
                <div class="forma-koloru">
                    <div class="rgb-input-group">
                        <label>R <input type="number" id="input-r-4" min="0" max="255" class="input-rgb"></label>
                        <label>G <input type="number" id="input-g-4" min="0" max="255" class="input-rgb"></label>
                        <label>B <input type="number" id="input-b-4" min="0" max="255" class="input-rgb"></label>
                    </div>
                    <button id="button-add-color-4" class="button-add-color">Add color</button>
                </div>
                <div id="paletka-list" class="paletka-list"></div>
            </div>
        </div>

        <!-- ЗАВДАННЯ 5: КОНСТРУКТОР ТЕСТУ -->
        <div id="zavdannya-5" class="zavdannya-section">
            <h2>Завдання 5 - Конструктор тесту</h2>
            <div class="konstruktor-test">
                <div class="pytannya-list-container">
                    <h3>All questions:</h3>
                    <div id="pytannya-list-5" class="pytannya-list-5"></div>
                </div>

                <div class="forma-pytannya">
                    <h3>Add new question:</h3>
                    <label>Question:
                        <input type="text" id="input-pytannya-5" class="input-pole-test">
                    </label>
                    <label>Correct answer:
                        <input type="text" id="input-pravilna-5" class="input-pole-test">
                    </label>
                    <label>Wrong answer:
                        <input type="text" id="input-hybna-5" class="input-pole-test">
                    </label>
                    <button id="button-add-pytannya-5" class="button-add-pytannya">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
